services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - tickets_data:/app/data
      - tickets_logs:/app/logs
    env_file: ./backend/.env
    environment:
      - ADMIN_USERNAME=admin
      - CORS_ORIGINS=["http://localhost:5173","http://127.0.0.1:5173"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; resp = urllib.request.urlopen('http://localhost:8000/api/health'); assert resp.status == 200\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped

volumes:
  tickets_data:
  tickets_logs:
